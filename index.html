<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            background: linear-gradient(-45deg, rgb(0, 0, 0), rgb(128, 0, 4), rgb(0, 0, 0));
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            margin: 0%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: aliceblue;
        }
        @keyframes gradientBG{
            0%{background-position: 0% 50%;}
            50%{background-position: 100% 50%;}
            100%{background-position: 0% 50%;}
        }
        .card{
            background-color: rgb(85, 2, 2);
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        .imgperfil{
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border-radius: 50%;
            border: 5px solid rgb(255, 255, 255);
            margin-bottom: 15px;
            object-fit: cover;
        }
        h2{
            margin: 10px 0 5px;
            font-size: 25px;
        }
        .local{
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .job{
            font-size: 16px;
            line-height: 1.5;
        }

        .botoes{
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn{
            background-color: aliceblue;
            display: inline-block;
            text-decoration: none;
            text-align: center;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid rgb(0, 0, 0);
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        a{
            text-decoration: none;
        }

        .btn:hover{
            opacity: 0.8;
            background: rgb(241, 133, 133);
        }

        .skills{
            margin-top: 16px;
            text-align: left;
        }

        .skills h3{
            font-size: 20px;
            margin-bottom: 10px;
        }

        .tags{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag{
            border: 1px solid aliceblue;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .social-media{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }
        .social-media a{
            text-decoration: none;
            color: white;
        }

        .social-media i{
            cursor: pointer;
            transition: 0.3s;
        }

        .social-media i:hover{
            color: rgb(243, 112, 112);
            transform: scale(1.2);
        }


    </style>
</head>
<body>
    <div class="card">
        <img src="C:\Users\1066730\Documents\UC13\ProjetoCard\ronaldincaricatura.png" alt="Foto de Perfil" class="imgperfil">
        <h2>Caio Henrique R. Nunes</h2>
        <div class="local">Montes Claros - MG</div>
        <div class="job">Técnico em Informática <br>Engenheiro da Computação</div>

        <div class="botoes">
            <a href="https://wa.me/5538991895819?text=Olá,%20vim%20pelo%20card." target="_blank" class="btn primario">Mensagem</a>
            <a href="https://www.linkedin.com/in/caio-henrique-8b83703b3/" target="_blank" class="btn secundario">Follow</a>
        </div>
        <div class="skills">
            <h3>Habilidades:</h3>
            <div class="tags">
                <span class="tag">Hardwares</span>
                <span class="tag">Redes</span>
                <span class="tag">Banco de Dados</span>
                <span class="tag">Conhecimento em Packet Trace</span>
                <span class="tag">Conhecimento em HTML</span>
                <span class="tag">Criativo</span>
                <span class="tag">Responsável</span>
                <span class="tag">Aprendizado Rápido</span>
            </div>
        </div>
        <div class="social-media">
            <a href="https://wa.me/5538991895819" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/caio_henriquekkj" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/CaioHrodriguess" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/caio-henrique-8b83703b3/" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>
    </div>
    
</body>
</html>
